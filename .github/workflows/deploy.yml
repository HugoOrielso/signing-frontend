# .github/workflows/deploy.yml
name: Build & Deploy to CapRover

on:
  push:
    branches:
      - main  # o el branch que uses para producción

env:
  IMAGE_NAME: frontend  # nombre de tu app en CapRover

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Login al registry (GitHub Container Registry) ───────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_GHCR }}

      # ─── Build y push de la imagen ────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/hugoorielso/dimcultura-frontend:production
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_API_IMAGES=${{ secrets.NEXT_PUBLIC_API_IMAGES }}
            BUILD_ID=${{ github.run_number }}

      # ─── Deploy a CapRover ────────────────────────────────────────────────
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}      # https://captain.tudominio.com
          app: ${{ secrets.CAPROVER_APP_NAME }}       # nombre de la app en CapRover
          token: ${{ secrets.CAPROVER_APP_TOKEN }}    # token de la app (no el root)
          image: ghcr.io/hugoorielso/dimcultura-frontend:production